# ==========================================
# Butterfly 主题配置 - 简约清爽风
# ==========================================

# 导航菜单
menu:
  首页: / || fas fa-home
  归档: /archives/ || fas fa-archive
  标签: /tags/ || fas fa-tags
  分类: /categories/ || fas fa-folder-open

# 搜索
search:
  enable: true
  type: local

# 头像
avatar:
  img: /images/avatar.jpg
  effect: true

# 副标题（打字机效果）
subtitle:
  enable: true
  effect: true
  loop: true
  source: false
  sub:
    - "网络安全学习者"
    - "渗透测试入门中"
    - "记录成长之路"

# 社交链接
social_contact:
  enable: true
  links:
    github: https://github.com/Hjr-ovo || fab fa-github

# 首页文章卡片
home_article:
  style: 1
  class: stagger

# 文章目录
toc:
  post: true
  number: true
  expand: false

# 版权声明
copyright:
  enable: true
  license: CC BY-NC-SA 4.0
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

# 相关文章
related_post:
  enable: true
  limit: 6

# 页脚
footer:
  owner:
    enable: true
    since: 2026
  copyright: true

# 访问统计
busuanzi:
  site_uv: true
  site_pv: true
  page_pv: true

# 图片懒加载
lazyload:
  enable: true

# 评论（暂时关闭）
comments:
  use: false

# Follow Me 按钮
aside:
  card_author:
    button:
      enable: true
      link: https://github.com/Hjr-ovo
      text: Follow Me
      icon: fab fa-github  
