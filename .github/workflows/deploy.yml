name: Deploy Hexo Blog

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Hexo CLI
        run: npm install -g hexo-cli

      - name: Install dependencies
        run: npm install

      - name: Install theme dependencies
        run: cd themes/butterfly && npm install

      - name: Install Butterfly plugins
        run: |
          npm install hexo-renderer-pug --save
          npm install hexo-renderer-stylus --save
          npm install hexo-wordcount --save
          npm install hexo-generator-search --save
          npm install hexo-generator-feed --save

      - name: Fix highlight.styl bug
        run: |
          HIGHLIGHT_FILE="themes/butterfly/source/css/_highlight/highlight.styl"
          if [ -f "$HIGHLIGHT_FILE" ]; then
            sed -i 's/\$highlight-tools\.bg\.color/\$highlight-tools-background/g' "$HIGHLIGHT_FILE"
            sed -i 's/\$highlight-tools\.color/\$highlight-tools-color/g' "$HIGHLIGHT_FILE"
            sed -i 's/\$highlight-gutter\.bg\.color/\$highlight-gutter-background/g' "$HIGHLIGHT_FILE"
            sed -i 's/\$highlight-gutter\.color/\$highlight-gutter-color/g' "$HIGHLIGHT_FILE"
            echo "Fixed highlight.styl"
          else
            echo "highlight.styl not found, skipping"
          fi

      - name: Build Hexo
        run: npx hexo clean && npx hexo generate

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
